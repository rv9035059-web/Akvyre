      background: linear-gradient(135deg, #E6C25B 0%, var(--amber) 100%);
      color: #0A0A0B !important;
    }

    .btn-gold-filled:hover .btn-gold-arrow {
      transform: translateX(4px);
    }

    .btn-gold-filled:active {
      transform: translateY(0px);
      box-shadow: 0 2px 10px rgba(212, 175, 55, 0.18);
    }

    /* Premium Luxury Nav Links */
    .nav-link-premium {
      position: relative;
      padding: 6px 0;
      transition: color 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      text-decoration: none;
    }

    .nav-link-premium::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      width: 0;
      height: 1px;
      background: var(--amber);
      transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1), left 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .nav-link-premium:hover::after,
    .nav-link-premium.active::after {
      width: 100%;
      left: 0;
    }

    /* Premium Theme Toggle Hover Rotation */
    .theme-toggle-btn {
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), color 0.3s ease;
    }
    
    .theme-toggle-btn:hover {
      transform: rotate(20deg) scale(1.08);
      color: var(--amber) !important;
    }

    /* Logo transitions */
    .wordmark {
      transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1), transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .wordmark:hover {
      opacity: 0.9;
      transform: scale(1.01);
    }

    .fab-calendly {
      position: fixed;
      bottom: 32px;
      right: 32px;
      z-index: 45;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background-color: var(--amber);
      color: #FFFFFF !important;
      border-radius: 50%;
      transition: background-color 220ms ease, transform 220ms ease, box-shadow 220ms ease;
      cursor: pointer;
      border: none;
      box-shadow: 0 8px 30px rgba(212, 175, 55, 0.25);
      text-decoration: none;
      animation: fab-entrance 600ms cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .fab-calendly:hover {
      background-color: #E6C25B;
      color: #FFFFFF !important;
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 12px 40px rgba(212, 175, 55, 0.35);
    }

    .fab-calendly:active {
      transform: translateY(1px) scale(0.96);
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.15);
    }

    .fab-calendly-icon {
      transition: transform 200ms ease;
    }

    .fab-calendly:hover .fab-calendly-icon {
      transform: rotate(-8deg) scale(1.15);
    }

    @keyframes fab-entrance {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.9);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 768px) {
      .fab-calendly {
        bottom: 24px;
        right: 24px;
        width: 48px;
        height: 48px;
      }
    }

    /* ── Industries icon cards ─────────────────────────────── */
    .industries-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      margin-top: 3.5rem;
    }

    .industry-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 36px 16px 30px;
      background: var(--bone-faint);
      border: 0.5px solid var(--hairline);
      border-radius: 6px;
      cursor: default;
      opacity: 0;
      transform: translateY(18px);
      transition:
        background   0.35s cubic-bezier(0.16, 1, 0.3, 1),
        border-color 0.35s cubic-bezier(0.16, 1, 0.3, 1),
        box-shadow   0.35s cubic-bezier(0.16, 1, 0.3, 1),
        transform    0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* staggered entrance */
    .industry-card.ind-visible {
      animation: ind-fade-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
      animation-delay: var(--ind-delay, 0ms);
    }

    @keyframes ind-fade-up {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .industry-card:hover {
      background: rgba(212, 175, 55, 0.055);
      border-color: rgba(212, 175, 55, 0.28);
      box-shadow: 0 8px 32px rgba(212, 175, 55, 0.08), inset 0 0 0 0.5px rgba(212,175,55,0.1);
      transform: translateY(-3px);
    }

    .industry-card .ind-icon {
      color: var(--bone-dim);
      transition: color 0.35s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .industry-card:hover .ind-icon {
      color: var(--amber);
      transform: scale(1.1);
    }

    .industry-card .ind-label {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--bone-dim);
      text-align: center;
      line-height: 1.4;
      transition: color 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .industry-card:hover .ind-label {
      color: var(--bone);
    }

    @media (max-width: 1024px) {
      .industries-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
    }
    @media (max-width: 640px) {
      .industries-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }
      .industry-card {
        padding: 28px 12px 22px;
        gap: 14px;
      }
    }


    /* Industry row highlight flash (when navigated from homepage card) */
    @keyframes ind-row-flash {
      0%   { background: transparent; }
      20%  { background: rgba(212, 175, 55, 0.1); padding-left: 14px; }
      80%  { background: rgba(212, 175, 55, 0.07); padding-left: 14px; }
      100% { background: transparent; padding-left: 0; }
    }
    .ind-row-highlight {
      animation: ind-row-flash 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    /* Highly Creative Asymmetrical Editorial Timeline Board */
    .timeline-board {
      position: relative;
      margin-top: 32px;
    }

    @media (min-width: 768px) {
      .timeline-board::before {
        content: "";
        position: absolute;
        left: 25%;
        top: 0;
        bottom: 0;
        width: 0.5px;
        background: var(--hairline);
        opacity: 0.35;
        pointer-events: none;
      }
    }

    .timeline-row {
      position: relative;
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      padding: 48px 0;
      border-bottom: 0.5px solid var(--hairline);
      transition: all 0.45s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .timeline-row::after {
      content: "";
      position: absolute;
      inset: 0 -24px;
      background: linear-gradient(to right, rgba(212, 175, 55, 0.012), transparent);
      opacity: 0;
      transition: opacity 0.5s ease;
      z-index: -1;
      pointer-events: none;
    }

    @media (min-width: 768px) {
      .timeline-row {
        grid-template-columns: 3fr 9fr;
        gap: 64px;
        padding: 64px 0;
      }
    }

    .timeline-row:hover::after {
      opacity: 1;
    }

    .timeline-row:last-child {
      border-bottom: none;
    }

    /* Interactive Dot Node on Timeline Thread */
    .timeline-dot {
      display: none;
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--hairline);
      border: 1px solid var(--bg-color, #0a0a0b);
      left: calc(25% - 3px);
      top: calc(50% - 3px);
      z-index: 10;
      transition: all 0.45s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
    }

    @media (min-width: 768px) {
      .timeline-dot {
        display: block;
      }
    }

    .timeline-row:hover .timeline-dot {
      background: var(--amber);
      box-shadow: 0 0 14px 4px rgba(212, 175, 55, 0.45);
      transform: scale(1.6);
    }

    /* Left Narrative Column */
    .timeline-narrative-left {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 12px;
      position: relative;
    }

    .timeline-roman {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-size: clamp(32px, 3.5vw, 44px);
      font-weight: 300;
      line-height: 1;
      color: var(--amber);
      opacity: 0.85;
      transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .timeline-row:hover .timeline-roman {
      transform: translateX(4px);
    }

    .timeline-tag {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--bone-dim);
      opacity: 0.7;
      transition: color 0.35s ease, opacity 0.35s ease;
    }

    .timeline-row:hover .timeline-tag {
      color: var(--amber);
      opacity: 1;
    }

    /* Right Content Column */
    .timeline-content-right {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .timeline-headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(24px, 2.5vw, 32px);
      font-weight: 300;
      line-height: 1.25;
      letter-spacing: -0.015em;
      color: var(--bone);
      transition: color 0.35s ease;
    }

    .timeline-row:hover .timeline-headline {
      color: #ffffff;
    }

    [data-theme="light"] .timeline-row:hover .timeline-headline {
      color: #0A0A0B;
    }

    /* Immersive Animated Pointer Line */
    .timeline-accent-line {
      height: 0.5px;
      background: linear-gradient(to right, var(--amber) 40%, rgba(212, 175, 55, 0.1) 100%);
      width: 40px;
      margin: 16px 0;
      transition: width 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .timeline-row:hover .timeline-accent-line {
      width: 100%;
      max-width: 320px;
    }

    .timeline-body {
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.7;
      color: var(--bone-dim);
      max-w-2xl;
      transition: color 0.35s ease;
    }

    .timeline-row:hover .timeline-body {
      color: var(--bone);
    }

    /* Typographic Architectural Metrics Grid */
    .kpi-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      margin-top: 32px;
    }

    @media (min-width: 480px) {
      .kpi-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 36px;
      }
    }

    .kpi-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-left: 1px solid rgba(212, 175, 55, 0.15);
      padding-left: 16px;
      transition: border-color 0.4s ease;
    }

    .timeline-row:hover .kpi-item {
      border-left-color: var(--amber);
    }

    .kpi-val {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-size: clamp(32px, 3.2vw, 42px);
      font-weight: 300;
      line-height: 1;
      color: var(--amber);
    }

    .kpi-lbl {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--bone-dim);
      opacity: 0.8;
    }

    /* Focus highlighted timeline row (Homepage transition flash) */
    @keyframes timeline-row-flash {
      0%   { background: transparent; }
      20%  { background: rgba(212, 175, 55, 0.08); padding-left: 12px; }
      80%  { background: rgba(212, 175, 55, 0.05); padding-left: 12px; }
      100% { background: transparent; padding-left: 0; }
    }

    .ind-row-highlight {
      animation: timeline-row-flash 1.8s cubic-bezier(0.16, 1, 0.3, 1) forwards !important;
    }


    .underline-amber {
      text-decoration: none;
      background-image: linear-gradient(var(--amber), var(--amber));
      background-position: 0 110%;
      background-repeat: no-repeat;
      background-size: 0 1px;
      transition: background-size 220ms ease, color 220ms ease;
      padding-bottom: 4px;
    }

    .underline-amber:hover {
      background-size: 100% 1px;
      color: var(--amber);
    }

    .text-arrow {
      display: inline-flex;
      align-items: baseline;
      gap: 0.45em;
      color: var(--bone);
      transition: color 200ms ease;
      cursor: pointer;
      background: transparent;
      border: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
    }

    .text-arrow .arrow {
      transition: transform 220ms ease;
      display: inline-block;
    }

    .text-arrow:hover {
      color: var(--amber);
    }

    .text-arrow:hover .arrow {
      transform: translateX(4px);
    }

    /* Reveal */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 1000ms ease, transform 1000ms ease;
      will-change: opacity, transform;
    }

    .reveal.is-in {
      opacity: 1;
      transform: translateY(0);
    }

    /* Hero entry */
    @keyframes heroIn {
      from {
        transform: translateY(20px);
      }

      to {
        transform: translateY(0);
      }
    }

    .hero-in-eyebrow {
      animation: heroIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
    }

    .hero-in-head {
      animation: heroIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
    }

    .hero-in-body {
      animation: heroIn 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.55s both;
    }

    /* Ambient glow */
    @keyframes ambientDrift {
      0% {
        transform: translate(-10%, -8%) scale(1);
      }

      33% {
        transform: translate(8%, 4%) scale(1.08);
      }

      66% {
        transform: translate(-4%, 10%) scale(0.96);
      }

      100% {
        transform: translate(-10%, -8%) scale(1);
      }
    }

    .ambient-glow {
      position: absolute;
      inset: -20%;
      background: radial-gradient(closest-side, var(--amber-soft), transparent 70%);
      filter: blur(8px);
      animation: ambientDrift 48s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    /* Inputs */
    .field {
      position: relative;
      padding-top: 22px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--hairline);
      transition: border-color 200ms ease;
    }

    .field:focus-within {
      border-bottom-color: var(--amber);
    }

    .field label {
      position: absolute;
      top: 24px;
      left: 0;
      color: var(--bone-dim);
      /* Original font-family commented out */
      /* font-family: 'Geist Mono', monospace; */
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      pointer-events: none;
      transition: transform 220ms ease, color 220ms ease, font-size 220ms ease;
    }

    .field input,
    .field textarea {
      background: transparent;
      border: 0;
      outline: none;
      width: 100%;
      color: var(--bone);
      /* Original font-family commented out */
      /* font-family: 'Geist', sans-serif; */
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 16px;
      line-height: 1.6;
      padding: 4px 0 2px 0;
      resize: vertical;
    }

    .field.filled label,
    .field:focus-within label {
      transform: translateY(-22px);
      font-size: 10px;
      color: var(--amber);
    }

    /* Focus visible */
    :focus-visible {
      outline: 1px solid var(--amber);
      outline-offset: 3px;
    }

    /* Monogram portrait placeholder */
    .monogram {
      position: relative;
      background: linear-gradient(160deg, rgba(21, 21, 23, 0) 0%, #1a1a1c 55%, #0d0d0f 100%);
      border-bottom: 0.5px solid var(--hairline);
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
    }

    .monogram::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 70% 20%, rgba(212, 175, 55, 0.06), transparent 60%),
        linear-gradient(180deg, rgba(10, 10, 11, 0.0) 60%, rgba(10, 10, 11, 0.6) 100%);
      pointer-events: none;
    }

    .monogram .glyph {
      /* Original font-family commented out */
      /* font-family: 'Fraunces', serif; */
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 92px;
      line-height: 1;
      letter-spacing: -0.02em;
      color: rgba(234, 229, 220, 0.85);
      padding: 0 0 28px 32px;
      position: relative;
      z-index: 1;
    }

    /* Practice row hover */
    .practice-row .desc {
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 350ms ease, transform 350ms ease, color 200ms ease;
    }

    .practice-row:hover .desc {
      opacity: 1;
      transform: translateY(0);
    }

    .practice-row .name {
      transition: color 200ms ease, transform 220ms ease;
    }

    .practice-row:hover .name {
      color: var(--amber);
    }

    .practice-row .num {
      transition: color 200ms ease;
    }

    .practice-row:hover .num {
      color: var(--bone);
    }

    /* Nav blur surface */
    .nav-surface {
      background: rgba(10, 10, 11, 0.7);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 0.5px solid var(--hairline);
    }

    /* Scrollbar — minimal */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(234, 229, 220, 0.10);
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    /* Wordmark spacing tweak — K and Y are the characterful letters */
    .wordmark .k,
    .wordmark .y {
      font-style: normal;
    }

    /* Article body spacing & typography */
    .prose-akvyr {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .prose-akvyr p {
      margin-bottom: 1.2em;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .prose-akvyr p:last-child {
      margin-bottom: 0;
    }

    .prose-akvyr h3 {
      /* Original font-family commented out */
      /* font-family: 'Fraunces', serif; */
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 28px;
      letter-spacing: -0.02em;
      margin-top: 1.6em;
      margin-bottom: 0.6em;
    }

    .prose-akvyr ul {
      list-style: none;
      padding: 0;
      margin: 0 0 1.6em 0;
    }

    .prose-akvyr ul li {
      padding: 14px 0;
      border-bottom: 0.5px solid var(--hairline);
      color: var(--bone);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .prose-akvyr ul li:first-child {
      border-top: 0.5px solid var(--hairline);
    }

    /* Font Utilities for subpages & checklists */
    .font-sans {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* ============================================================
       Cases / Selected Matters Premium Option B Layout & Animations
       ============================================================ */
    .cases-container {
      margin-top: 4rem;
    }

    .case-row-modern {
      border-top: 0.5px solid var(--hairline);
      cursor: pointer;
      background: transparent;
      transition: background 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                  padding-left 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                  padding-right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .case-row-modern:hover {
      background: rgba(212, 175, 55, 0.015);
      padding-left: 20px !important;
      padding-right: 10px !important;
    }

    .case-row-modern .case-num {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(36px, 4vw, 54px);
      font-weight: 300;
      color: var(--bone-dim);
      opacity: 0.2;
      line-height: 0.9;
      transition: color 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                  opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .case-row-modern:hover .case-num {
      color: var(--amber);
      opacity: 0.45;
    }

    .case-row-modern .case-tag {
      color: var(--bone-dim);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      transition: color 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .case-row-modern:hover .case-tag {
      color: var(--amber);
    }

    .case-row-modern .case-headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(22px, 2.2vw, 30px);
      font-weight: 300;
      line-height: 1.2;
      letter-spacing: -0.01em;
      color: var(--bone);
      transition: color 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .case-row-modern:hover .case-headline {
      color: var(--bone);
    }

    .case-row-modern .case-body {
      font-family: 'Inter', sans-serif;
      font-size: 14.5px;
      line-height: 1.6;
      font-weight: 300;
      color: var(--bone-dim);
      margin-top: 0.5rem;
      max-width: 620px;
    }

    .case-row-modern .case-metric-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0.5px solid var(--hairline);
      border-radius: 3px;
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 500;
